name: Build bottles

# Triggered by the main repo's release workflow (repository_dispatch `release`)
# or manually. Builds the `funput` formula for macOS arm64 + x86_64, uploads the
# bottle tarballs to a GitHub Release on this tap, and commits the merged
# `bottle do` block back into Formula/funput.rb.
on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to bottle, e.g. 1.2026.1"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: bottle-${{ github.event.client_payload.version || inputs.version }}
  cancel-in-progress: false

env:
  VERSION: ${{ github.event.client_payload.version || inputs.version }}
  FORMULA: funput

jobs:
  # ---- Point the formula at the new upstream tarball ------------------------
  bump:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - name: Bump url + sha256 to v${{ env.VERSION }}
        run: |
          set -euo pipefail
          url="https://github.com/Funput/Funput/archive/refs/tags/v${VERSION}.tar.gz"
          sha=$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1)
          root="https://github.com/Funput/homebrew-tap/releases/download/${FORMULA}-${VERSION}"
          f="Formula/${FORMULA}.rb"
          # Replace the url, its following sha256, and the bottle root_url.
          perl -0pi -e "s|url \"https://github.com/Funput/Funput/archive/refs/tags/v[^\"]*\"|url \"$url\"|" "$f"
          perl -0pi -e "s|(url \"[^\"]*\"\n  sha256 )\"[0-9a-f]{64}\"|\${1}\"$sha\"|" "$f"
          perl -0pi -e "s|root_url \"[^\"]*\"|root_url \"$root\"|" "$f"
          echo "Bumped $f to v${VERSION} (sha256 $sha)"
      - id: tag
        run: echo "tag=${FORMULA}-${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Commit the version bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "funput ${VERSION}: bump to upstream release" || echo "no changes"
          git push
      # Create (or reuse) the Release that will host the bottle assets.
      - name: Ensure bottle Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${FORMULA}-${VERSION}" >/dev/null 2>&1 || \
            gh release create "${FORMULA}-${VERSION}" \
              --title "funput ${VERSION} bottles" \
              --notes "Homebrew bottles for funput ${VERSION}."

  # ---- Build a bottle per arch ----------------------------------------------
  build:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        # macos-14 = Apple Silicon (arm64, oldest arm64 image → its bottle also
        # pours on newer macOS); ubuntu-latest = x86_64_linux. Intel macOS and
        # arm64 Linux have no free runner and fall back to build-from-source.
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # macOS runners ship Homebrew on PATH; Linux runners do not, so install it.
      - uses: Homebrew/actions/setup-homebrew@master
      - name: Tap this repository
        run: |
          set -euo pipefail
          brew update
          brew tap Funput/tap "https://github.com/${{ github.repository }}"
          # Make sure we build the just-bumped formula.
          brew update-reset "$(brew --repository Funput/tap)"

      - name: Build bottle
        run: |
          set -euo pipefail
          brew install --build-bottle "Funput/tap/${FORMULA}"
          brew bottle --json --no-rebuild \
            --root-url "https://github.com/Funput/homebrew-tap/releases/download/${FORMULA}-${VERSION}" \
            "Funput/tap/${FORMULA}"
          # `brew bottle` writes a LOCAL file with a double dash
          # (funput--<ver>.<tag>.bottle.tar.gz), but the bottle JSON's "filename" —
          # the name Homebrew builds the download URL from — uses a SINGLE dash.
          # Upload under the single-dash name so `brew install` can pour it; the raw
          # double-dash name 404s. Collapse the first `--` → `-` on the tarball.
          # The `mv` fails the job (set -e) if brew produced no bottle, surfacing it here.
          mkdir -p dist
          for f in ./*.bottle.tar.gz; do
            base=$(basename "$f")
            mv "$f" "dist/${base/--/-}"
          done
          mv ./*.bottle.json dist/
          echo "Produced:"; ls -l dist

      # Upload BOTH the bottle tarball and its JSON to the Release. The merge job
      # then fetches the JSONs with `gh release download` — far more reliable here
      # than cross-job `actions/upload/download-artifact`, which silently produced
      # empty/absent downloads in this workflow.
      - name: Upload bottle tarball + JSON to the Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${FORMULA}-${VERSION}" \
            dist/*.bottle.tar.gz dist/*.bottle.json \
            --clobber --repo "${{ github.repository }}"

  # ---- Merge the per-arch checksums into the formula ------------------------
  merge:
    needs: build
    runs-on: macos-14
    steps:
      - uses: Homebrew/actions/setup-homebrew@master
      # Tap + merge + commit in ONE step. Order matters: refresh the tap clone
      # FIRST, then download the bottle JSONs, then merge — with nothing in
      # between. Previously the JSONs were downloaded and `find`-listed, and only
      # then did `brew update`/`brew update-reset` run before `brew bottle
      # --merge` read them; that left a window where the files `find` had listed
      # were gone by the time brew opened them, so `brew bottle --merge` died with
      # `No such file or directory @ rb_sysopen - .../bottles/funput--<ver>.<tag>.bottle.json`
      # (the very first thing merge does is File.read every JSON arg).
      - name: Merge bottle blocks and commit to the tap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Refresh Homebrew + the tap clone we are about to edit, before any
          # bottle JSON is written into the workspace.
          brew update
          brew tap Funput/tap "https://github.com/${{ github.repository }}"
          brew update-reset "$(brew --repository Funput/tap)"

          # Now pull every platform's bottle JSON straight from the Release the
          # build jobs uploaded to — no cross-job artifact passing involved — and
          # merge immediately, so nothing runs between writing and reading them.
          rm -rf bottles && mkdir -p bottles
          gh release download "${FORMULA}-${VERSION}" \
            --pattern '*.bottle.json' --dir bottles --repo "${{ github.repository }}"
          echo "Downloaded:"; ls -l bottles

          jsons=$(find "$(pwd)/bottles" -name '*.bottle.json' | sort)
          if [ -z "$jsons" ]; then
            echo "::error::No .bottle.json downloaded from the ${FORMULA}-${VERSION} release."
            exit 1
          fi
          echo "Merging:"; echo "$jsons"

          # Fold every platform's sha256 into the formula's `bottle do` block.
          # --no-all-checks keeps the per-arch bottles separate instead of trying
          # to collapse them into one `all:` bottle. That collapse path would
          # `FileUtils.cp` the local double-dash tarball (which the build job
          # renamed to single-dash before upload and which we never download
          # here), so it must be disabled — our arches carry distinct sha256s
          # anyway, so nothing is lost.
          # shellcheck disable=SC2086  # word-split $jsons into multiple path args.
          brew bottle --merge --write --no-commit --no-all-checks $jsons

          tap="$(brew --repository Funput/tap)"
          git -C "$tap" config user.name "github-actions[bot]"
          git -C "$tap" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "$tap" remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git -C "$tap" commit -am "funput ${VERSION}: add bottles" \
            || { echo "no changes to commit"; exit 0; }
          git -C "$tap" push origin HEAD:main
